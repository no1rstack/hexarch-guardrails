<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1240" height="320" rx="8" ry="8" fill="#ffffff" stroke="#d1d5db" />

  <rect x="60" y="140" width="140" height="80" rx="6" ry="6" fill="#f9fafb" stroke="#111827" />
  <text x="130" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">Inject</text>
  <text x="130" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Trigger</text>

  <rect x="260" y="140" width="190" height="80" rx="6" ry="6" fill="#f9fafb" stroke="#111827" />
  <text x="355" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">HTTP Request</text>
  <text x="355" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">POST /authorize</text>

  <rect x="510" y="140" width="200" height="80" rx="6" ry="6" fill="#f9fafb" stroke="#111827" />
  <text x="610" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">Hexarch Guardrails</text>
  <text x="610" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Policy evaluation</text>

  <rect x="770" y="140" width="180" height="80" rx="6" ry="6" fill="#f9fafb" stroke="#111827" />
  <text x="860" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">Switch</text>
  <text x="860" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">allow / deny</text>

  <rect x="1010" y="80" width="220" height="80" rx="6" ry="6" fill="#f9fafb" stroke="#111827" />
  <text x="1120" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">Controlled Continuation</text>
  <text x="1120" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Run downstream call</text>

  <rect x="1010" y="210" width="220" height="80" rx="6" ry="6" fill="#f9fafb" stroke="#111827" />
  <text x="1120" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#111827">Blocked Execution</text>
  <text x="1120" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#374151">Stop branch</text>

  <line x1="200" y1="180" x2="260" y2="180" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="450" y1="180" x2="510" y2="180" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="710" y1="180" x2="770" y2="180" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="950" y1="170" x2="1010" y2="120" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="950" y1="190" x2="1010" y2="250" stroke="#111827" stroke-width="2" marker-end="url(#arrow)" />

  <text x="972" y="155" font-family="Arial, sans-serif" font-size="12" fill="#111827">ALLOW</text>
  <text x="972" y="220" font-family="Arial, sans-serif" font-size="12" fill="#111827">DENY</text>
</svg>